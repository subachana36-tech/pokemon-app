<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon App</title>
    <link rel="stylesheet" href="styke.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="container">
        <h1 id="main-title" style="cursor: pointer;">ポケモン<span>図鑑</span></h1>
        
        <div class="search-container">
            <input type="text" id="pokemon-search" placeholder="ポケモンの名前や番号を入力...">
            <button id="search-btn">検索</button>
        </div>

        <section id="search-section" style="display: none; margin-bottom: 4rem;">
            <h2 style="margin-bottom: 1.5rem;">検索結果 / データカード</h2>
            <div class="search-flex-container">
                <div class="search-left-column">
                    <div id="search-results" class="pokedex-grid-single">
                        <!-- 検索されたポケモンのカード -->
                    </div>
                    <div id="explanation-card" class="explanation-card" style="display: none;">
                        <!-- しんちょう・たいじゅうが表示されるカード -->
                    </div>
                </div>
                <div id="data-card-wrapper" class="data-card-wrapper">
                    <!-- データカードの詳細内容 -->
                </div>
            </div>
            <hr style="margin: 3rem 0; border: 0; border-top: 1px solid var(--glass-border);">
        </section>

        <section id="list-section">
            <h2 style="margin-bottom: 1.5rem;">すべてのポケモン</h2>
            <div id="pokedex" class="pokedex-grid">
                <div class="loader">
                    <div class="pokeball"></div>
                    <p>読み込み中...</p>
                </div>
            </div>
        </section>
    </div>

    <script src="js.js"></script>
</body>

</html>
